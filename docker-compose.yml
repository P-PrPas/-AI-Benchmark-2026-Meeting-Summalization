services:
  camnet:
    image: camnet-p
    build:
      context: .
      args:
        BASE_IMAGE: nvidia/cuda:12.1.0-cudnn8-runtime-ubuntu22.04
        CAMNET_LLM_MODEL_NAME: ${CAMNET_LLM_MODEL_NAME:-typhoon2-1b}
    platform: linux/amd64
    gpus: all
    environment:
      CAMNET_MODEL_DIR: /model/weights
      CAMNET_LLM_MODEL_NAME: ${CAMNET_LLM_MODEL_NAME:-typhoon2-1b}
      CAMNET_STARTUP_SLEEP_SECONDS: ${CAMNET_STARTUP_SLEEP_SECONDS:-10}
      CAMNET_TEST_PATH: /model/test/test_set.json
      CAMNET_OUTPUT_DIR: /result
      CAMNET_PROGRESS_LIB: /benchmark_lib/progress
    volumes:
      - ./weight:/model/weights:ro
      - ./data/test:/model/test:ro
      - ./output:/result:rw
      - ./benchmark_lib:/benchmark_lib:ro
    working_dir: /model

    # GPU support (uncomment if the host has NVIDIA runtime)
